<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="Aether Studios — Instagram profile (white)">
  <!-- Off-white sage tint background -->
  <rect width="1080" height="1080" fill="#EDF2E5"/>

  <!-- Subtle sage radial so the circular IG crop has gentle depth -->
  <radialGradient id="g" cx="50%" cy="42%" r="65%">
    <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="70%" stop-color="#EDF2E5" stop-opacity="0"/>
  </radialGradient>
  <rect width="1080" height="1080" fill="url(#g)"/>

  <!-- Mark — centered, sized for ~58% of canvas, sage colour -->
  <g transform="translate(338 338) scale(16.83)">
    <path d="M21 3c0 6-3 12-9 13C6.5 16.5 3 13 3 8c0-3 2-5 5-5 4 0 5 4 9 0Z" fill="#7E9171"/>
    <path d="M3 21c4-3 8-7 12-13" fill="none" stroke="#7E9171" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</svg>
